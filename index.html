<!-- ver3 single-page unified input + history -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>経費精算アプリ</title>
  <?!= include('stylesheet'); ?>
</head>
<body>
  <!-- ローディング -->
  <div id="loading" class="loading-overlay hidden">
    <div class="spinner"></div>
    <div id="loadingText" class="loading-text">処理中...</div>
  </div>

  <div class="app-container">
    <!-- ヘッダー -->
    <header class="app-header">
      <div>
        <h1 id="pageTitle">🧾 経費入力</h1>
        <div class="header-sub" id="headerUser">読み込み中...</div>
      </div>
      <button
        type="button"
        class="btn btn-sm"
        style="background:rgba(255,255,255,0.2);color:#fff;border:none;"
        onclick="doLogout()"
      >
        ログアウト
      </button>
    </header>

    <main class="app-main">
      <!-- グローバルメッセージ -->
      <div id="alertMsg" class="hidden"></div>

      <!-- =========================
           入力ビュー
           ========================= -->
      <section id="inputView">
        <!-- 撮影エリア -->
        <div class="card">
          <div class="card-title">📷 領収書を撮影</div>

          <div
            class="preview-area"
            id="previewArea"
            onclick="document.getElementById('cameraInput').click()"
          >
            <div class="preview-placeholder" id="previewPlaceholder">
              <div class="ph-icon">📷</div>
              <p>タップして撮影 / 画像を選択</p>
            </div>
            <img id="previewImg" class="hidden" alt="領収書プレビュー">
          </div>

          <input
            type="file"
            id="cameraInput"
            accept="image/*"
            capture="environment"
            style="display:none"
            onchange="handleImageSelect(event)"
          >

          <div class="flex" style="gap:8px;margin-top:10px;">
            <button
              type="button"
              class="btn btn-outline"
              style="flex:1;"
              onclick="document.getElementById('cameraInput').click()"
            >
              📷 カメラ
            </button>
            <button
              type="button"
              class="btn btn-secondary"
              style="flex:1;"
              onclick="document.getElementById('galleryInput').click()"
            >
              🖼️ ギャラリー
            </button>
          </div>

          <input
            type="file"
            id="galleryInput"
            accept="image/*"
            style="display:none"
            onchange="handleImageSelect(event)"
          >

          <button
            type="button"
            id="ocrBtn"
            class="btn btn-primary mt-8"
            disabled
            onclick="runOCR()"
          >
            <span class="btn-icon">🔍</span> OCRで自動読取
          </button>

          <div id="ocrStatus" class="text-sub text-center mt-8 hidden"></div>
        </div>

        <!-- 入力フォーム -->
        <div class="card">
          <div class="card-title">📝 経費情報</div>

          <div
            class="check-group"
            id="advancePayGroup"
            style="margin-bottom:14px;"
            onclick="toggleAdvance()"
          >
            <input
              type="checkbox"
              id="isAdvancePayment"
              onclick="event.stopPropagation(); toggleAdvance()"
            >
            <label for="isAdvancePayment">💰 立替金として処理する</label>
          </div>

          <div class="form-group">
            <label class="form-label">📅 日付 <span class="text-danger">*</span></label>
            <input type="date" id="expenseDate" class="form-control" required>
          </div>

          <div class="form-group">
            <label class="form-label">💴 金額（円） <span class="text-danger">*</span></label>
            <input
              type="number"
              id="amount"
              class="form-control"
              placeholder="例：1500"
              min="0"
              inputmode="numeric"
            >
          </div>

          <div class="form-group">
            <label class="form-label">🏪 支払先</label>
            <input
              type="text"
              id="payee"
              class="form-control"
              placeholder="例：〇〇パーキング"
            >
          </div>

          <div class="form-group">
            <label class="form-label">🔢 インボイス番号</label>
            <input
              type="text"
              id="invoiceNo"
              class="form-control"
              placeholder="例：T1234567890123（なければ空白）"
              maxlength="14"
              pattern="^T\d{13}$|^$"
            >
            <div
              id="invoiceError"
              class="text-danger hidden"
              style="font-size:12px;margin-top:4px;"
            >
              形式が正しくありません（T + 13桁の数字）
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">📂 費目</label>
            <select id="categorySelect" class="form-control">
              <option value="">読み込み中...</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">💬 コメント</label>
            <textarea
              id="comment"
              class="form-control"
              placeholder="メモや補足を入力（任意）"
              rows="2"
            ></textarea>
          </div>

          <button
            type="button"
            id="saveBtn"
            class="btn btn-primary"
            disabled
            onclick="saveRecord()"
          >
            <span class="btn-icon">💾</span> 登録する
          </button>

          <div class="text-sub text-center mt-8" id="saveHint">
            ※ 画像を選択すると登録できます
          </div>
        </div>
      </section>

      <!-- =========================
           履歴ビュー
           ========================= -->
      <section id="historyView" class="hidden">
        <div class="flex-between" style="margin-bottom:12px;gap:8px;">
          <select
            id="monthSelect"
            class="form-control"
            style="flex:1;"
            onchange="loadRecords()"
          ></select>

          <button
            type="button"
            class="btn btn-outline btn-sm"
            onclick="showReportModal()"
          >
            📊 レポート
          </button>
        </div>

        <div class="summary-bar hidden" id="summaryBar">
          <div>
            <div class="sum-label">合計金額</div>
            <div class="sum-value" id="totalAmount">¥0</div>
          </div>
          <div class="sum-count" id="recordCount">0件</div>
        </div>

        <div id="recordList"></div>
      </section>
    </main>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
      <button type="button" id="navInput" class="nav-btn active" onclick="showView('input')">
        <span class="nav-icon">➕</span>新規入力
      </button>
      <button type="button" id="navHistory" class="nav-btn" onclick="showView('history')">
        <span class="nav-icon">📋</span>履歴
      </button>
      <button type="button" class="nav-btn" onclick="doLogout()">
        <span class="nav-icon">🚪</span>ログアウト
      </button>
    </nav>
  </div>

  <!-- ===== 編集モーダル ===== -->
  <div id="editModal" class="modal-overlay hidden" onclick="closeEditModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">✏️ 経費を編集</div>

      <input type="hidden" id="editRecordId">

      <div
        class="check-group"
        id="editAdvanceGroup"
        style="margin-bottom:14px;"
        onclick="toggleEditAdvance()"
      >
        <input
          type="checkbox"
          id="editIsAdvance"
          onclick="event.stopPropagation(); toggleEditAdvance()"
        >
        <label>💰 立替金として処理する</label>
      </div>

      <div class="form-group">
        <label class="form-label">📅 日付</label>
        <input type="date" id="editDate" class="form-control">
      </div>

      <div class="form-group">
        <label class="form-label">💴 金額（円）</label>
        <input type="number" id="editAmount" class="form-control" min="0">
      </div>

      <div class="form-group">
        <label class="form-label">🏪 支払先</label>
        <input type="text" id="editPayee" class="form-control">
      </div>

      <div class="form-group">
        <label class="form-label">🔢 インボイス番号</label>
        <input
          type="text"
          id="editInvoiceNo"
          class="form-control"
          placeholder="T1234567890123 または空白"
          maxlength="14"
        >
      </div>

      <div class="form-group">
        <label class="form-label">📂 費目</label>
        <select id="editCategory" class="form-control"></select>
      </div>

      <div class="form-group">
        <label class="form-label">💬 コメント</label>
        <textarea id="editComment" class="form-control" rows="2"></textarea>
      </div>

      <div class="flex" style="gap:8px;margin-top:8px;">
        <button
          type="button"
          class="btn btn-secondary"
          style="flex:1;"
          onclick="closeEditModal()"
        >
          キャンセル
        </button>
        <button
          type="button"
          class="btn btn-primary"
          style="flex:1;"
          onclick="updateRecord()"
        >
          💾 保存する
        </button>
      </div>
    </div>
  </div>

  <!-- ===== レポートモーダル ===== -->
  <div id="reportModal" class="modal-overlay hidden" onclick="closeReportModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">📊 月次レポート出力</div>

      <div class="form-group">
        <label class="form-label">📅 対象月</label>
        <select id="reportMonth" class="form-control"></select>
      </div>

      <div class="form-group">
        <label class="form-label">📄 出力種別</label>
        <select id="reportType" class="form-control">
          <option value="both">両方（経費一覧 + 画像PDF）</option>
          <option value="list">経費一覧スプレッドシートのみ</option>
          <option value="pdf">領収書画像PDFのみ</option>
        </select>
      </div>

      <div id="reportPreview" class="alert alert-info hidden"></div>

      <div id="reportResult" class="hidden">
        <div class="divider"></div>
        <div class="alert alert-success">✅ レポートが生成されました</div>
        <div id="reportLinks" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>

      <div class="flex" style="gap:8px;margin-top:16px;">
        <button
          type="button"
          class="btn btn-secondary"
          style="flex:1;"
          onclick="closeReportModal()"
        >
          閉じる
        </button>
        <button
          type="button"
          id="generateBtn"
          class="btn btn-primary"
          style="flex:1;"
          onclick="generateReport()"
        >
          📊 生成する
        </button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // index.html - 入力ビュー + 履歴ビュー統合版
    // ============================================================

    const API_URL = window.location.origin + window.location.pathname;

    let currentUser = null;
    let currentImageDataUrl = null;
    let currentView = 'input';
    let allRecords = [];
    let categories = [];
    let editPrevCat = 'CAT001';

    function buildLoginUrl() {
      const url = new URL(window.location.href);
      url.searchParams.delete('page');
      url.searchParams.delete('view');
      url.hash = '';
      return url.toString();
    }

    async function callAPI(params) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(params),
          redirect: 'follow'
        });

        const text = await res.text();
        return JSON.parse(text);
      } catch (err) {
        console.error('callAPI error:', err);
        throw err;
      }
    }

    function showLoading(text = '処理中...') {
      document.getElementById('loadingText').textContent = text;
      document.getElementById('loading').classList.remove('hidden');
    }

    function hideLoading() {
      document.getElementById('loading').classList.add('hidden');
    }

    function showAlert(msg, type = 'info') {
      const el = document.getElementById('alertMsg');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.classList.remove('hidden');

      if (type === 'success' || type === 'info') {
        setTimeout(() => el.classList.add('hidden'), 3000);
      }
    }

    function hideAlert() {
      document.getElementById('alertMsg').classList.add('hidden');
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setToday() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      document.getElementById('expenseDate').value = `${yyyy}-${mm}-${dd}`;
    }

    function updateHeaderTitle() {
      document.getElementById('pageTitle').textContent =
        currentView === 'history' ? '📋 経費履歴' : '🧾 経費入力';
    }

    async function showView(viewName) {
      currentView = viewName;

      document.getElementById('inputView').classList.toggle('hidden', viewName !== 'input');
      document.getElementById('historyView').classList.toggle('hidden', viewName !== 'history');

      document.getElementById('navInput').classList.toggle('active', viewName === 'input');
      document.getElementById('navHistory').classList.toggle('active', viewName === 'history');

      updateHeaderTitle();
      hideAlert();

      if (viewName === 'history') {
        await loadRecords();
      }
    }

    function buildMonthSelect(elemId) {
      const sel = document.getElementById(elemId);
      sel.innerHTML = '';

      const now = new Date();
      for (let i = 0; i < 12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const val = `${yyyy}-${mm}`;
        const label = `${yyyy}年${d.getMonth() + 1}月`;

        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = label;
        sel.appendChild(opt);
      }
    }

    async function loadCategories() {
      try {
        const result = await callAPI({ action: 'getCategories' });
        categories = [];

        if (result.success && Array.isArray(result.categories)) {
          categories = result.categories.map(cat => ({
            categoryId: cat.categoryId || cat.code || '',
            categoryName: cat.categoryName || cat.name || ''
          }));
        }

        buildInputCategorySelect();
      } catch (err) {
        console.error('カテゴリ取得エラー:', err);
        categories = [];
        buildInputCategorySelect();
      }
    }

    function buildInputCategorySelect() {
      const sel = document.getElementById('categorySelect');
      sel.innerHTML = '<option value="">-- 費目を選択 --</option>';

      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat.categoryId;
        opt.textContent = cat.categoryName;
        sel.appendChild(opt);
      });
    }

    function buildCategorySelect(elemId, selectedId) {
      const sel = document.getElementById(elemId);
      sel.innerHTML = '';

      categories.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.categoryId;
        opt.textContent = c.categoryName;
        if (c.categoryId === selectedId) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    async function init() {
      const token = sessionStorage.getItem('token');
      const userId = sessionStorage.getItem('userId');
      const userName = sessionStorage.getItem('displayName');
      const groupId = sessionStorage.getItem('groupId');
      const groupName = sessionStorage.getItem('groupName');

      if (!token) {
        location.href = buildLoginUrl();
        return;
      }

      try {
        showLoading('セッション確認中...');
        const result = await callAPI({
          action: 'validateSession',
          token
        });

        if (!result.success) {
          sessionStorage.clear();
          location.href = buildLoginUrl();
          return;
        }
      } catch (err) {
        console.error('validateSession failed:', err);
      } finally {
        hideLoading();
      }

      currentUser = { token, userId, userName, groupId, groupName };
      sessionStorage.setItem('appUrl', API_URL);

      document.getElementById('headerUser').textContent =
        `${groupName || ''} / ${userName || ''} さん`;

      setToday();
      buildMonthSelect('monthSelect');
      buildMonthSelect('reportMonth');
      await loadCategories();

      const url = new URL(window.location.href);
      const initialView =
        (url.searchParams.get('view') === 'history' || url.hash === '#history')
          ? 'history'
          : 'input';

      await showView(initialView);
    }

    // ===== 入力ビュー処理 =====

    function handleImageSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        currentImageDataUrl = ev.target.result;

        const img = document.getElementById('previewImg');
        img.src = currentImageDataUrl;
        img.classList.remove('hidden');
        document.getElementById('previewPlaceholder').classList.add('hidden');

        document.getElementById('ocrBtn').disabled = false;
        document.getElementById('saveBtn').disabled = false;
        document.getElementById('saveHint').classList.add('hidden');
      };
      reader.readAsDataURL(file);
    }

    function compressImage(dataUrl, maxPx = 1024, quality = 0.85) {
      return new Promise(resolve => {
        const img = new Image();

        img.onload = function() {
          let w = img.width;
          let h = img.height;

          if (w > maxPx || h > maxPx) {
            if (w > h) {
              h = Math.round(h * maxPx / w);
              w = maxPx;
            } else {
              w = Math.round(w * maxPx / h);
              h = maxPx;
            }
          }

          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };

        img.src = dataUrl;
      });
    }

    async function runOCR() {
      if (!currentImageDataUrl || !currentUser?.token) return;

      const btn = document.getElementById('ocrBtn');
      const status = document.getElementById('ocrStatus');

      btn.disabled = true;
      status.textContent = '🔍 OCR処理中...';
      status.classList.remove('hidden');

      try {
        showLoading('OCR処理中...');

        const compressed = await compressImage(currentImageDataUrl);
        const base64 = compressed.split(',')[1];

        const result = await callAPI({
          action: 'processOCR',
          token: currentUser.token,
          imageBase64: base64
        });

        if (result.success && result.data) {
          const d = result.data;

          if (d.date)      document.getElementById('expenseDate').value = d.date;
          if (d.amount)    document.getElementById('amount').value = d.amount;
          if (d.payee)     document.getElementById('payee').value = d.payee;
          if (d.invoiceNo) document.getElementById('invoiceNo').value = d.invoiceNo;
          if (d.category)  document.getElementById('categorySelect').value = d.category;

          status.textContent = '✅ OCR完了！内容を確認してください';
          showAlert('OCR完了！内容を確認してください', 'success');
        } else {
          status.textContent = '⚠️ 読取できませんでした。手動で入力してください';
          showAlert('OCR結果を取得できませんでした。手動で入力してください。', 'warning');
        }
      } catch (err) {
        console.error('OCRエラー:', err);
        status.textContent = '❌ OCRエラーが発生しました';
        showAlert('OCR処理でエラーが発生しました', 'error');
      } finally {
        hideLoading();
        btn.disabled = false;
      }
    }

    function toggleAdvance() {
      const cb = document.getElementById('isAdvancePayment');
      const sel = document.getElementById('categorySelect');

      if (cb.checked) {
        sel.value = 'CAT011';
        sel.disabled = true;
      } else {
        sel.disabled = false;
      }
    }

    document.getElementById('invoiceNo').addEventListener('input', function() {
      const val = this.value;
      const errEl = document.getElementById('invoiceError');

      if (val && !/^T\d{13}$/.test(val)) {
        errEl.classList.remove('hidden');
      } else {
        errEl.classList.add('hidden');
      }
    });

    async function saveRecord() {
      hideAlert();

      const date = document.getElementById('expenseDate').value;
      const amount = document.getElementById('amount').value;
      const payee = document.getElementById('payee').value;
      const category = document.getElementById('categorySelect').value;

      if (!date || !amount) {
        showAlert('日付と金額は必須です', 'error');
        return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-icon">⏳</span> 保存中...';

      try {
        let imageFileId = '';
        let imageUrl = '';

        if (currentImageDataUrl) {
          showLoading('画像をアップロード中...');
          const compressed = await compressImage(currentImageDataUrl);
          const base64 = compressed.split(',')[1];

          const imgResult = await callAPI({
            action: 'saveImage',
            token: currentUser.token,
            groupId: currentUser.groupId,
            imageBase64: base64,
            fileName: `receipt_${Date.now()}.jpg`
          });

          if (imgResult.success) {
            imageFileId = imgResult.fileId || '';
            imageUrl = imgResult.fileUrl || '';
          }
        }

        showLoading('登録中...');
        const saveResult = await callAPI({
          action: 'saveRecord',
          token: currentUser.token,
          groupId: currentUser.groupId,
          userId: currentUser.userId,
          date,
          amount: parseInt(amount, 10),
          payee,
          invoiceNo: document.getElementById('invoiceNo').value,
          categoryCode: category,
          advancePayment: document.getElementById('isAdvancePayment').checked,
          comment: document.getElementById('comment').value,
          imageFileId,
          imageUrl
        });

        if (saveResult.success) {
          showAlert('✅ 登録しました！', 'success');
          resetForm();
        } else {
          showAlert('保存エラー: ' + (saveResult.error || '不明なエラー'), 'error');
        }
      } catch (err) {
        console.error('保存エラー:', err);
        showAlert('保存処理でエラーが発生しました', 'error');
      } finally {
        hideLoading();
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-icon">💾</span> 登録する';
      }
    }

    function resetForm() {
      currentImageDataUrl = null;

      document.getElementById('previewImg').classList.add('hidden');
      document.getElementById('previewImg').src = '';
      document.getElementById('previewPlaceholder').classList.remove('hidden');
      document.getElementById('cameraInput').value = '';
      document.getElementById('galleryInput').value = '';

      document.getElementById('ocrBtn').disabled = true;
      document.getElementById('ocrStatus').classList.add('hidden');
      document.getElementById('ocrStatus').textContent = '';

      document.getElementById('amount').value = '';
      document.getElementById('payee').value = '';
      document.getElementById('invoiceNo').value = '';
      document.getElementById('categorySelect').value = '';
      document.getElementById('categorySelect').disabled = false;
      document.getElementById('isAdvancePayment').checked = false;
      document.getElementById('comment').value = '';

      setToday();

      document.getElementById('saveBtn').disabled = true;
      document.getElementById('saveHint').classList.remove('hidden');
    }

    // ===== 履歴ビュー処理 =====

    async function loadRecords() {
      const yearMonth = document.getElementById('monthSelect').value;
      showLoading('データ読み込み中...');

      try {
        const data = await callAPI({
          action: 'getRecords',
          token: currentUser.token,
          yearMonth
        });

        if (data.success) {
          allRecords = Array.isArray(data.records) ? data.records : [];
          renderRecords(allRecords);
        } else {
          allRecords = [];
          renderRecords([]);
          showAlert(data.error || 'データ取得に失敗しました', 'error');
        }
      } catch (e) {
        console.error('loadRecords error:', e);
        allRecords = [];
        renderRecords([]);
        showAlert('通信エラーが発生しました', 'error');
      } finally {
        hideLoading();
      }
    }

    function renderRecords(records) {
      const list = document.getElementById('recordList');
      const bar = document.getElementById('summaryBar');

      if (!records.length) {
        bar.classList.add('hidden');
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">この月の経費データはありません</div>
          </div>
        `;
        return;
      }

      const total = records.reduce((s, r) => s + (Number(r.amount) || 0), 0);
      document.getElementById('totalAmount').textContent = '¥' + total.toLocaleString();
      document.getElementById('recordCount').textContent = records.length + '件';
      bar.classList.remove('hidden');

      list.innerHTML = records.map((rec, idx) => `
        <div class="record-card ${rec.isAdvancePayment ? 'advance' : ''}">
          <div class="record-top">
            <div class="record-payee">
              <span style="font-size:12px;color:#9e9e9e;margin-right:4px;">No.${idx + 1}</span>
              ${esc(rec.payee || '（支払先不明）')}
            </div>
            <div class="record-amount">¥${Number(rec.amount || 0).toLocaleString()}</div>
          </div>

          <div class="record-meta">
            <span>📅 ${esc(rec.date || '')}</span>
            <span>👤 ${esc(rec.displayName || '')}</span>
            <span class="badge badge-primary">${esc(rec.categoryName || '')}</span>
            ${rec.isAdvancePayment ? '<span class="badge badge-warning">💰 立替金</span>' : ''}
            ${rec.invoiceNo ? `<span class="badge" style="background:#f1f8e9;color:#388e3c;">🔢 ${esc(rec.invoiceNo)}</span>` : ''}
          </div>

          ${rec.comment ? `<div class="record-comment">💬 ${esc(rec.comment)}</div>` : ''}

          <div class="record-actions">
            ${rec.imageFileId ? `
              <button
                type="button"
                class="btn btn-secondary btn-sm"
                onclick="openImage('${esc(rec.imageFileId)}')"
              >
                🖼️ 画像
              </button>
            ` : ''}

            <button
              type="button"
              class="btn btn-outline btn-sm"
              onclick="showEditModal('${esc(rec.recordId)}')"
            >
              ✏️ 編集
            </button>

            <button
              type="button"
              class="btn btn-sm"
              style="background:#fce8e6;color:#c62828;"
              onclick="deleteRecord('${esc(rec.recordId)}', '${esc(rec.payee || '')}')"
            >
              🗑️ 削除
            </button>
          </div>
        </div>
      `).join('');
    }

    function openImage(fileId) {
      window.open(`https://drive.google.com/file/d/${fileId}/view`, '_blank');
    }

    function showEditModal(recordId) {
      const rec = allRecords.find(r => r.recordId === recordId);
      if (!rec) return;

      document.getElementById('editRecordId').value = rec.recordId;
      document.getElementById('editDate').value = rec.date || '';
      document.getElementById('editAmount').value = rec.amount || '';
      document.getElementById('editPayee').value = rec.payee || '';
      document.getElementById('editInvoiceNo').value = rec.invoiceNo || '';
      document.getElementById('editComment').value = rec.comment || '';

      const isAdv = !!rec.isAdvancePayment;
      document.getElementById('editIsAdvance').checked = isAdv;

      editPrevCat = rec.categoryId || 'CAT001';

      buildCategorySelect('editCategory', isAdv ? 'CAT011' : editPrevCat);
      document.getElementById('editCategory').disabled = isAdv;
      document.getElementById('editAdvanceGroup').style.background =
        isAdv ? '#fff3cd' : '#fff8e1';

      document.getElementById('editModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeEditModal(event) {
      if (event && event.target !== document.getElementById('editModal')) return;
      document.getElementById('editModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function toggleEditAdvance() {
      const cb = document.getElementById('editIsAdvance');
      const sel = document.getElementById('editCategory');

      if (cb.checked) {
        editPrevCat = sel.value || 'CAT001';
        buildCategorySelect('editCategory', 'CAT011');
        sel.disabled = true;
        document.getElementById('editAdvanceGroup').style.background = '#fff3cd';
      } else {
        sel.disabled = false;
        buildCategorySelect('editCategory', editPrevCat);
        document.getElementById('editAdvanceGroup').style.background = '#fff8e1';
      }
    }

    async function updateRecord() {
      const recordId = document.getElementById('editRecordId').value;
      const sel = document.getElementById('editCategory');
      const invoiceNo = document.getElementById('editInvoiceNo').value;

      if (invoiceNo && !/^T\d{13}$/.test(invoiceNo)) {
        alert('インボイス番号の形式が正しくありません（T + 13桁の数字）');
        return;
      }

      showLoading('更新中...');

      try {
        const data = await callAPI({
          action: 'updateRecord',
          token: currentUser.token,
          recordId,
          updates: {
            date: document.getElementById('editDate').value,
            amount: parseInt(document.getElementById('editAmount').value, 10) || 0,
            payee: document.getElementById('editPayee').value,
            invoiceNo: invoiceNo,
            categoryId: sel.value,
            categoryName: sel.options[sel.selectedIndex]?.textContent || '',
            isAdvancePayment: document.getElementById('editIsAdvance').checked,
            comment: document.getElementById('editComment').value
          }
        });

        if (data.success) {
          closeEditModal();
          showAlert('✅ 更新しました', 'success');
          await loadRecords();
        } else {
          alert('更新に失敗しました: ' + (data.error || ''));
        }
      } catch (e) {
        console.error('updateRecord error:', e);
        alert('通信エラーが発生しました');
      } finally {
        hideLoading();
      }
    }

    async function deleteRecord(recordId, payee) {
      if (!confirm(`「${payee}」を削除しますか？\nこの操作は元に戻せません。`)) return;

      showLoading('削除中...');

      try {
        const data = await callAPI({
          action: 'deleteRecord',
          token: currentUser.token,
          recordId
        });

        if (data.success) {
          showAlert('🗑️ 削除しました', 'info');
          await loadRecords();
        } else {
          showAlert('削除に失敗しました: ' + (data.error || ''), 'error');
        }
      } catch (e) {
        console.error('deleteRecord error:', e);
        showAlert('通信エラーが発生しました', 'error');
      } finally {
        hideLoading();
      }
    }

    // ===== レポート =====

    function showReportModal() {
      const curMonth = document.getElementById('monthSelect').value;
      document.getElementById('reportMonth').value = curMonth;

      const preview = document.getElementById('reportPreview');
      if (allRecords.length > 0) {
        const total = allRecords.reduce((s, r) => s + (Number(r.amount) || 0), 0);
        preview.textContent =
          `${document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].textContent}：${allRecords.length}件 / 合計 ¥${total.toLocaleString()}`;
        preview.classList.remove('hidden');
      } else {
        preview.classList.add('hidden');
      }

      document.getElementById('reportResult').classList.add('hidden');
      document.getElementById('reportLinks').innerHTML = '';
      document.getElementById('generateBtn').disabled = false;

      document.getElementById('reportModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeReportModal(event) {
      if (event && event.target !== document.getElementById('reportModal')) return;
      document.getElementById('reportModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    async function generateReport() {
      const yearMonth = document.getElementById('reportMonth').value;
      const reportType = document.getElementById('reportType').value;

      document.getElementById('generateBtn').disabled = true;
      showLoading('レポート生成中...\n（50件で約1分かかります）');

      try {
        const data = await callAPI({
          action: 'generateReport',
          token: currentUser.token,
          yearMonth,
          reportType
        });

        if (data.success) {
          const links = document.getElementById('reportLinks');
          links.innerHTML = '';

          if (data.listUrl) {
            links.innerHTML += `
              <a
                href="${data.listUrl}"
                target="_blank"
                class="btn btn-outline"
                style="justify-content:flex-start;"
              >
                📊 経費一覧スプレッドシートを開く
              </a>
            `;
          }

          if (data.pdfUrl) {
            links.innerHTML += `
              <a
                href="${data.pdfUrl}"
                target="_blank"
                class="btn btn-outline"
                style="justify-content:flex-start;"
              >
                📄 領収書画像PDFを開く
              </a>
            `;
          }

          document.getElementById('reportResult').classList.remove('hidden');
        } else {
          alert('レポート生成に失敗しました: ' + (data.error || ''));
          document.getElementById('generateBtn').disabled = false;
        }
      } catch (e) {
        console.error('generateReport error:', e);
        alert('通信エラーが発生しました');
        document.getElementById('generateBtn').disabled = false;
      } finally {
        hideLoading();
      }
    }

    // ===== ログアウト =====

    async function doLogout() {
      try {
        await callAPI({
          action: 'logout',
          token: currentUser?.token || sessionStorage.getItem('token')
        });
      } catch (e) {
        console.warn('logout API failed:', e);
      }

      sessionStorage.clear();
      location.href = buildLoginUrl();
    }

    // ===== 起動 =====
    window.addEventListener('load', init);
  </script>
</body>
</html>
