<script>
// ============================================================
// index.html - 統合版クライアントサイドJS（入力 + 履歴）
// ============================================================

// ===== 定数・状態 =====
const APP_URL = '<?= ScriptApp.getService().getUrl(); ?>';

let currentUser         = null;   // { token, userId, userName, groupId, groupName }
let currentImageDataUrl = null;
let allRecords          = [];     // 履歴ビュー用
let categories          = [];     // 費目マスター
let editPrevCat         = '';     // 編集モーダル：前回カテゴリ

/**
 * ★ iOS Safari 対応: トップフレーム遷移
 * Safari は async/await 内の window.open() をポップアップとしてブロックする。
 * 代わりに <a target="_top"> を動的生成して .click() することで回避。
 */
function navigateTop(url) {
  var a = document.createElement('a');
  a.href = url;
  a.target = '_top';
  a.style.position = 'fixed';
  a.style.top = '-9999px';
  document.body.appendChild(a);
  a.click();

  // フォールバック: 2秒経っても遷移しない場合、リンクを表示
  setTimeout(function() {
    if (document.body.contains(a)) document.body.removeChild(a);
    var fb = document.getElementById('navFallback');
    if (!fb) {
      fb = document.createElement('div');
      fb.id = 'navFallback';
      fb.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:20px;background:#fff;box-shadow:0 -2px 12px rgba(0,0,0,0.15);text-align:center;z-index:10000;';
      fb.innerHTML = '<p style="margin:0 0 12px;font-size:14px;color:#333;">自動遷移できませんでした</p>' +
        '<a href="' + url + '" target="_top" style="display:inline-block;padding:12px 32px;background:#1a73e8;color:#fff;border-radius:8px;text-decoration:none;font-weight:bold;">タップして進む →</a>';
      document.body.appendChild(fb);
    }
  }, 2000);
}

// ===== API共通（text/plain でCORS回避） =====
async function callAPI(params) {
  try {
    const res = await fetch(APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(params),
      redirect: 'follow'
    });
    const text = await res.text();
    if (!text) throw new Error('APIレスポンスが空です');
    try { return JSON.parse(text); }
    catch { throw new Error('APIレスポンスの解析に失敗しました'); }
  } catch (err) {
    console.error('callAPI error:', err);
    throw err;
  }
}

// ===== ローディング制御 =====
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '処理中...';
  document.getElementById('loading').classList.remove('hidden');
}
function hideLoading() {
  document.getElementById('loading').classList.add('hidden');
}

// ===== メッセージ表示 =====
function showAlert(msg, type, targetId) {
  const el = document.getElementById(targetId || 'inputAlertMsg');
  el.textContent = msg;
  el.className = 'alert alert-' + (type || 'info');
  el.classList.remove('hidden');
  if (type === 'success') setTimeout(() => el.classList.add('hidden'), 3000);
}
function hideAlert(targetId) {
  document.getElementById(targetId || 'inputAlertMsg').classList.add('hidden');
}

// ===== HTMLエスケープ =====
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// ビュー切替
// ============================================================
function showInputView() {
  document.getElementById('inputView').classList.remove('hidden');
  document.getElementById('historyView').classList.add('hidden');
  document.getElementById('navInput').classList.add('active');
  document.getElementById('navHistory').classList.remove('active');
  document.getElementById('headerTitle').textContent = '🧾 経費入力';
}

function showHistoryView() {
  document.getElementById('inputView').classList.add('hidden');
  document.getElementById('historyView').classList.remove('hidden');
  document.getElementById('navInput').classList.remove('active');
  document.getElementById('navHistory').classList.add('active');
  document.getElementById('headerTitle').textContent = '📋 経費履歴';
  // 初回表示時にレコード読み込み
  loadRecords();
}

// ============================================================
// 初期化
// ============================================================
async function init() {
  const token     = sessionStorage.getItem('token');
  const userId    = sessionStorage.getItem('userId');
  const userName  = sessionStorage.getItem('displayName');
  const groupId   = sessionStorage.getItem('groupId');
  const groupName = sessionStorage.getItem('groupName');

  if (!token) {
    // ★ ローディング表示改善: ログイン画面への遷移中も表示
    showLoading('ログイン画面へ移動中...');
    navigateTop(APP_URL);
    return;
  }

  // セッション検証
  try {
    showLoading('セッション確認中...');
    const result = await callAPI({ action: 'validateSession', token });
    if (!result.success) {
      sessionStorage.clear();
      showLoading('セッション切れ — ログイン画面へ移動中...');
      navigateTop(APP_URL);
      return;
    }
  } catch (err) {
    console.error('validateSession failed:', err);
  } finally {
    hideLoading();
  }

  currentUser = { token, userId, userName, groupId, groupName };

  // ヘッダーにユーザー情報表示
  document.getElementById('headerUser').textContent = groupName + ' / ' + userName + ' さん';

  // 今日の日付をセット
  const today = new Date();
  const yyyy  = today.getFullYear();
  const mm    = String(today.getMonth() + 1).padStart(2, '0');
  const dd    = String(today.getDate()).padStart(2, '0');
  document.getElementById('expenseDate').value = yyyy + '-' + mm + '-' + dd;

  // カテゴリ読み込み（入力・履歴共通で使用）
  await loadCategories();

  // 月選択プルダウン生成（履歴ビュー用）
  buildMonthSelect('monthSelect');
  buildMonthSelect('reportMonth');

  // 入力ビューを表示
  showInputView();
}

// ============================================================
// カテゴリ（共通）
// ============================================================
async function loadCategories() {
  try {
    const result = await callAPI({ action: 'getCategories' });
    if (result.success && result.categories) {
      categories = result.categories;
      // 入力フォームのセレクトにも反映
      const sel = document.getElementById('categorySelect');
      sel.innerHTML = '<option value="">-- 費目を選択 --</option>';
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat.code;
        opt.textContent = cat.name;
        sel.appendChild(opt);
      });
    }
  } catch (err) {
    console.error('カテゴリ取得エラー:', err);
  }
}

/** 編集モーダル用：費目セレクト構築 */
function buildCategorySelect(elemId, selectedCode) {
  const sel = document.getElementById(elemId);
  sel.innerHTML = '';
  categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.code;
    opt.textContent = c.name;
    if (c.code === selectedCode) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ============================================================
// 月選択プルダウン（履歴ビュー用）
// ============================================================
function buildMonthSelect(elemId) {
  const sel = document.getElementById(elemId);
  sel.innerHTML = '';
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    // ★ YYYY-MM形式（Sheets.js の normalizeYearMonth に合わせる）
    const val   = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    const label = d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = label;
    sel.appendChild(opt);
  }
}

// ============================================================
// 入力ビュー：画像選択
// ============================================================
function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    currentImageDataUrl = ev.target.result;
    const img = document.getElementById('previewImg');
    img.src = currentImageDataUrl;
    img.classList.remove('hidden');
    document.getElementById('previewPlaceholder').classList.add('hidden');
    document.getElementById('ocrBtn').disabled = false;
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveHint').classList.add('hidden');
  };
  reader.readAsDataURL(file);
}

// ============================================================
// 入力ビュー：画像圧縮
// ============================================================
function compressImage(dataUrl, maxPx, quality) {
  maxPx = maxPx || 1024;
  quality = quality || 0.85;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else       { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

// ============================================================
// 入力ビュー：OCR実行
// ============================================================
async function runOCR() {
  if (!currentImageDataUrl) return;

  var btn = document.getElementById('ocrBtn');
  var status = document.getElementById('ocrStatus');
  btn.disabled = true;
  status.textContent = '🔍 OCR処理中...';
  status.classList.remove('hidden');

  try {
    showLoading('OCR処理中...');
    var compressed = await compressImage(currentImageDataUrl);
    var base64 = compressed.split(',')[1];

    var result = await callAPI({
      action: 'processOCR',
      token: currentUser.token,
      imageBase64: base64
    });

    if (result.success && result.data) {
      var d = result.data;
      if (d.date)      document.getElementById('expenseDate').value    = d.date;
      if (d.amount)    document.getElementById('amount').value         = d.amount;
      if (d.payee)     document.getElementById('payee').value          = d.payee;
      if (d.invoiceNo) document.getElementById('invoiceNo').value      = d.invoiceNo;
      if (d.category)  document.getElementById('categorySelect').value = d.category;
      status.textContent = '✅ OCR完了！内容を確認してください';
      showAlert('OCR完了！内容を確認してください', 'success', 'inputAlertMsg');
    } else {
      status.textContent = '⚠️ 読取できませんでした。手動で入力してください';
      showAlert('OCR結果を取得できませんでした。手動で入力してください。', 'warning', 'inputAlertMsg');
    }
  } catch (err) {
    console.error('OCRエラー:', err);
    status.textContent = '❌ OCRエラーが発生しました';
    showAlert('OCR処理でエラーが発生しました', 'error', 'inputAlertMsg');
  } finally {
    hideLoading();
    btn.disabled = false;
  }
}

// ============================================================
// 入力ビュー：立替金トグル
// ============================================================
function toggleAdvance() {
  var cb  = document.getElementById('isAdvancePayment');
  var sel = document.getElementById('categorySelect');
  if (cb.checked) {
    sel.value    = 'CAT011';
    sel.disabled = true;
  } else {
    sel.disabled = false;
  }
}

// ===== インボイス番号バリデーション =====
document.getElementById('invoiceNo').addEventListener('input', function() {
  var val = this.value;
  var errEl = document.getElementById('invoiceError');
  if (val && !/^T\d{13}$/.test(val)) {
    errEl.classList.remove('hidden');
  } else {
    errEl.classList.add('hidden');
  }
});

// ============================================================
// 入力ビュー：登録処理
// ============================================================
async function saveRecord() {
  hideAlert('inputAlertMsg');

  var date     = document.getElementById('expenseDate').value;
  var amount   = document.getElementById('amount').value;
  var payee    = document.getElementById('payee').value;
  var category = document.getElementById('categorySelect').value;

  if (!date || !amount) {
    showAlert('日付と金額は必須です', 'error', 'inputAlertMsg');
    return;
  }

  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon">⏳</span> 保存中...';

  try {
    var imageFileId = '';
    var imageUrl    = '';

    if (currentImageDataUrl) {
      showLoading('画像をアップロード中...');
      var compressed = await compressImage(currentImageDataUrl);
      var base64 = compressed.split(',')[1];

      var imgResult = await callAPI({
        action: 'saveImage',
        token: currentUser.token,
        groupId: currentUser.groupId,
        imageBase64: base64,
        fileName: 'receipt_' + Date.now() + '.jpg'
      });

      if (imgResult.success) {
        imageFileId = imgResult.fileId  || '';
        imageUrl    = imgResult.fileUrl || '';
      }
    }

    showLoading('登録中...');
    var saveResult = await callAPI({
      action: 'saveRecord',
      token: currentUser.token,
      groupId: currentUser.groupId,
      userId: currentUser.userId,
      date: date,
      amount: parseInt(amount, 10),
      payee: payee,
      invoiceNo:      document.getElementById('invoiceNo').value,
      categoryCode:   category,
      advancePayment: document.getElementById('isAdvancePayment').checked,
      comment:        document.getElementById('comment').value,
      imageFileId: imageFileId,
      imageUrl: imageUrl
    });

    if (saveResult.success) {
      showAlert('✅ 登録しました！', 'success', 'inputAlertMsg');
      resetForm();
    } else {
      showAlert('保存エラー: ' + (saveResult.error || '不明なエラー'), 'error', 'inputAlertMsg');
    }
  } catch (err) {
    console.error('保存エラー:', err);
    showAlert('保存処理でエラーが発生しました', 'error', 'inputAlertMsg');
  } finally {
    hideLoading();
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">💾</span> 登録する';
  }
}

// ============================================================
// 入力ビュー：フォームリセット
// ============================================================
function resetForm() {
  currentImageDataUrl = null;
  document.getElementById('previewImg').classList.add('hidden');
  document.getElementById('previewImg').src = '';
  document.getElementById('previewPlaceholder').classList.remove('hidden');
  document.getElementById('cameraInput').value  = '';
  document.getElementById('galleryInput').value = '';
  document.getElementById('ocrBtn').disabled = true;
  document.getElementById('ocrStatus').classList.add('hidden');
  document.getElementById('ocrStatus').textContent = '';
  document.getElementById('amount').value          = '';
  document.getElementById('payee').value           = '';
  document.getElementById('invoiceNo').value       = '';
  document.getElementById('categorySelect').value  = '';
  document.getElementById('categorySelect').disabled = false;
  document.getElementById('isAdvancePayment').checked = false;
  document.getElementById('comment').value         = '';

  var today = new Date();
  document.getElementById('expenseDate').value =
    today.getFullYear() + '-' +
    String(today.getMonth() + 1).padStart(2, '0') + '-' +
    String(today.getDate()).padStart(2, '0');

  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveHint').classList.remove('hidden');
}

// ============================================================
// 履歴ビュー：レコード読み込み
// ============================================================
async function loadRecords() {
  var yearMonth = document.getElementById('monthSelect').value;
  showLoading('データ読み込み中...');

  try {
    var data = await callAPI({
      action: 'getRecords',
      token: currentUser.token,
      yearMonth: yearMonth
    });
    if (data.success) {
      allRecords = data.records;
      renderRecords(allRecords);
    } else {
      showAlert(data.error || 'データ取得に失敗しました', 'error', 'historyAlertMsg');
    }
  } catch (e) {
    showAlert('通信エラーが発生しました', 'error', 'historyAlertMsg');
  } finally {
    hideLoading();
  }
}

// ============================================================
// 履歴ビュー：レコード描画
// ============================================================
function renderRecords(records) {
  var list = document.getElementById('recordList');
  var bar  = document.getElementById('summaryBar');

  if (records.length === 0) {
    bar.classList.add('hidden');
    list.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">📭</div>' +
        '<div class="empty-text">この月の経費データはありません</div>' +
      '</div>';
    return;
  }

  // 合計計算
  var total = records.reduce(function(s, r) { return s + (Number(r.amount) || 0); }, 0);
  document.getElementById('totalAmount').textContent = '¥' + total.toLocaleString();
  document.getElementById('recordCount').textContent = records.length + '件';
  bar.classList.remove('hidden');

  // カード生成
  list.innerHTML = records.map(function(rec, idx) {
    return '<div class="record-card ' + (rec.isAdvancePayment ? 'advance' : '') + '">' +
      '<div class="record-top">' +
        '<div class="record-payee">' +
          '<span style="font-size:12px;color:#9e9e9e;margin-right:4px;">No.' + (idx+1) + '</span>' +
          esc(rec.payee || '（支払先不明）') +
        '</div>' +
        '<div class="record-amount">¥' + Number(rec.amount||0).toLocaleString() + '</div>' +
      '</div>' +
      '<div class="record-meta">' +
        '<span>📅 ' + (rec.date || '') + '</span>' +
        '<span>👤 ' + esc(rec.displayName || '') + '</span>' +
        '<span class="badge badge-primary">' + esc(rec.categoryName || '') + '</span>' +
        (rec.isAdvancePayment ? '<span class="badge badge-warning">💰 立替金</span>' : '') +
        (rec.invoiceNo ? '<span class="badge" style="background:#f1f8e9;color:#388e3c;">🔢 ' + esc(rec.invoiceNo) + '</span>' : '') +
      '</div>' +
      (rec.comment ? '<div class="record-comment">💬 ' + esc(rec.comment) + '</div>' : '') +
      '<div class="record-actions">' +
        (rec.imageFileId ? '<button class="btn btn-secondary btn-sm" onclick="openImage(\'' + rec.imageFileId + '\')">🖼️ 画像</button>' : '') +
        '<button class="btn btn-outline btn-sm" onclick="showEditModal(\'' + esc(rec.recordId) + '\')">✏️ 編集</button>' +
        '<button class="btn btn-sm" style="background:#fce8e6;color:#c62828;" onclick="deleteRecord(\'' + esc(rec.recordId) + '\', \'' + esc(rec.payee || '') + '\')">🗑️ 削除</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ===== 画像を開く =====
function openImage(fileId) {
  window.open('https://drive.google.com/file/d/' + fileId + '/view', '_blank');
}

// ============================================================
// 履歴ビュー：編集モーダル
// ============================================================
function showEditModal(recordId) {
  var rec = allRecords.find(function(r) { return r.recordId === recordId; });
  if (!rec) return;

  document.getElementById('editRecordId').value  = rec.recordId;
  document.getElementById('editDate').value      = rec.date || '';
  document.getElementById('editAmount').value    = rec.amount || '';
  document.getElementById('editPayee').value     = rec.payee || '';
  document.getElementById('editInvoiceNo').value = rec.invoiceNo || '';
  document.getElementById('editComment').value   = rec.comment || '';

  var isAdv = !!rec.isAdvancePayment;
  document.getElementById('editIsAdvance').checked = isAdv;
  editPrevCat = rec.categoryId || '';

  buildCategorySelect('editCategory', isAdv ? 'CAT011' : editPrevCat);
  document.getElementById('editCategory').disabled = isAdv;
  document.getElementById('editAdvanceGroup').style.background = isAdv ? '#fff3cd' : '#fff8e1';

  document.getElementById('editModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeEditModal(event) {
  if (event && event.target !== document.getElementById('editModal')) return;
  document.getElementById('editModal').classList.add('hidden');
  document.body.style.overflow = '';
}

/** 編集モーダル：立替金トグル */
function toggleEditAdvance() {
  var cb  = document.getElementById('editIsAdvance');
  var sel = document.getElementById('editCategory');
  if (cb.checked) {
    editPrevCat = sel.value || '';
    buildCategorySelect('editCategory', 'CAT011');
    sel.disabled = true;
    document.getElementById('editAdvanceGroup').style.background = '#fff3cd';
  } else {
    sel.disabled = false;
    buildCategorySelect('editCategory', editPrevCat);
    document.getElementById('editAdvanceGroup').style.background = '#fff8e1';
  }
}

/** レコード更新 */
async function updateRecord() {
  var recordId  = document.getElementById('editRecordId').value;
  var sel       = document.getElementById('editCategory');
  var invoiceNo = document.getElementById('editInvoiceNo').value;

  if (invoiceNo && !/^T\d{13}$/.test(invoiceNo)) {
    alert('インボイス番号の形式が正しくありません（T + 13桁の数字）');
    return;
  }

  showLoading('更新中...');
  try {
    var data = await callAPI({
      action: 'updateRecord',
      token: currentUser.token,
      recordId: recordId,
      updates: {
        date:             document.getElementById('editDate').value,
        amount:           parseInt(document.getElementById('editAmount').value) || 0,
        payee:            document.getElementById('editPayee').value,
        invoiceNo:        invoiceNo,
        categoryId:       sel.value,
        categoryName:     sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].textContent : '',
        isAdvancePayment: document.getElementById('editIsAdvance').checked,
        comment:          document.getElementById('editComment').value
      }
    });

    if (data.success) {
      document.getElementById('editModal').classList.add('hidden');
      document.body.style.overflow = '';
      showAlert('✅ 更新しました', 'success', 'historyAlertMsg');
      await loadRecords();
    } else {
      alert('更新に失敗しました: ' + (data.error || ''));
    }
  } catch (e) {
    alert('通信エラーが発生しました');
  } finally {
    hideLoading();
  }
}

/** レコード削除 */
async function deleteRecord(recordId, payee) {
  if (!confirm('「' + payee + '」を削除しますか？\nこの操作は元に戻せません。')) return;

  showLoading('削除中...');
  try {
    var data = await callAPI({
      action: 'deleteRecord',
      token: currentUser.token,
      recordId: recordId
    });
    if (data.success) {
      showAlert('🗑️ 削除しました', 'info', 'historyAlertMsg');
      await loadRecords();
    } else {
      showAlert('削除に失敗しました: ' + (data.error || ''), 'error', 'historyAlertMsg');
    }
  } catch (e) {
    showAlert('通信エラーが発生しました', 'error', 'historyAlertMsg');
  } finally {
    hideLoading();
  }
}

// ============================================================
// 履歴ビュー：レポートモーダル
// ============================================================
function showReportModal() {
  var curMonth = document.getElementById('monthSelect').value;
  document.getElementById('reportMonth').value = curMonth;

  var preview = document.getElementById('reportPreview');
  if (allRecords.length > 0) {
    var total = allRecords.reduce(function(s, r) { return s + (Number(r.amount) || 0); }, 0);
    var selEl = document.getElementById('monthSelect');
    preview.textContent =
      selEl.options[selEl.selectedIndex].textContent + '：' +
      allRecords.length + '件 / 合計 ¥' + total.toLocaleString();
    preview.classList.remove('hidden');
  } else {
    preview.classList.remove('hidden');
  }

  document.getElementById('reportResult').classList.add('hidden');
  document.getElementById('reportLinks').innerHTML = '';
  document.getElementById('generateBtn').disabled = false;

  document.getElementById('reportModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeReportModal(event) {
  if (event && event.target !== document.getElementById('reportModal')) return;
  document.getElementById('reportModal').classList.add('hidden');
  document.body.style.overflow = '';
}

async function generateReport() {
  var yearMonth  = document.getElementById('reportMonth').value;
  var reportType = document.getElementById('reportType').value;

  document.getElementById('generateBtn').disabled = true;
  showLoading('レポート生成中...\n（50件で約1分かかります）');

  try {
    var data = await callAPI({
      action: 'generateReport',
      token: currentUser.token,
      yearMonth: yearMonth,
      reportType: reportType
    });

    hideLoading();

    if (data.success) {
      var links = document.getElementById('reportLinks');
      links.innerHTML = '';

      if (data.listUrl) {
        links.innerHTML +=
          '<a href="' + data.listUrl + '" target="_blank" class="btn btn-outline" style="justify-content:flex-start;">' +
            '📊 経費一覧スプレッドシートを開く' +
          '</a>';
      }
      if (data.pdfUrl) {
        links.innerHTML +=
          '<a href="' + data.pdfUrl + '" target="_blank" class="btn btn-outline" style="justify-content:flex-start;">' +
            '📄 領収書画像PDFを開く' +
          '</a>';
      }
      document.getElementById('reportResult').classList.remove('hidden');
    } else {
      alert('レポート生成に失敗しました: ' + (data.error || ''));
      document.getElementById('generateBtn').disabled = false;
    }
  } catch (e) {
    hideLoading();
    alert('通信エラーが発生しました');
    document.getElementById('generateBtn').disabled = false;
  }
}

// ============================================================
// ログアウト
// ============================================================
async function doLogout() {
  if (!confirm('ログアウトしますか？')) return;

  // ★ ローディング表示改善: ログアウト処理中も表示
  showLoading('ログアウト中...');

  try {
    await callAPI({ action: 'logout', token: currentUser ? currentUser.token : '' });
  } catch (e) {
    // ログアウトAPI失敗でも遷移は続行
  }

  sessionStorage.clear();

  // ★ ローディング表示改善: 遷移中も表示を維持（消さない）
  showLoading('ログイン画面へ戻っています...');
  navigateTop(APP_URL);
}

// ============================================================
// 起動
// ============================================================
window.addEventListener('load', init);

</script>
